<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marc PLACES Manche Indicator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="dashboard">
    <header>
      <p class="eyebrow">Channel Decision Dashboard</p>
      <h1>Marc PLACES Manche Indicator</h1>
      <p id="reportDate">Chargement...</p>
      <a href="https://www.instagram.com/marcplaces" target="_blank">Instagram de Marc</a>
    </header>

    <section class="datePanel">
      <label for="datePicker">Choisir une date</label>
      <input type="date" id="datePicker" />
      <button id="loadBtn" type="button">Charger la data</button>
      <p id="bestTime">Chargement du meilleur créneau...</p>
    </section>

    <section class="kpis">
      <div class="kpi"><span>Décision</span><strong id="decision">--</strong></div>
      <div class="kpi dark"><span>Score</span><strong id="score">--</strong></div>
      <div class="kpi"><span>Vent / rafales</span><strong id="windKpi">--</strong></div>
      <div class="kpi"><span>Vagues</span><strong id="waveKpi">--</strong></div>
      <div class="kpi"><span>Eau</span><strong id="waterKpi">--</strong></div>
      <div class="kpi"><span>Visibilité</span><strong id="visibilityKpi">--</strong></div>
      <div class="kpi"><span>Courant</span><strong id="currentKpi">--</strong></div>
      <div class="kpi"><span>Faune</span><strong id="wildlifeKpi">--</strong></div>
    </section>

    <section class="card">
      <h2>Résumé décisionnel</h2>
      <p id="summary"></p>
    </section>

    <section class="card">
      <h2>Points de vigilance</h2>
      <ul id="watchItems"></ul>
    </section>

    <section class="card">
      <h2>Matrice des risques</h2>
      <table>
        <tbody id="riskTable"></tbody>
      </table>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
